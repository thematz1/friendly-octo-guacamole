<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — LuxeBrand</title>
  <meta name="description" content="Sign in to your LuxeBrand account to access exclusive luxury goods and brokerage services.">
  <meta property="og:title" content="Sign In — LuxeBrand">
  <meta property="og:description" content="Sign in to your LuxeBrand account">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%2216%22%20fill%3D%22%231C1917%22%2F%3E%3Ctext%20x%3D%2216%22%20y%3D%2222%22%20font-family%3D%22Georgia%2C%20serif%22%20font-size%3D%2220%22%20fill%3D%22%23CA8A04%22%20text-anchor%3D%22middle%22%3EL%3C%2Ftext%3E%3C%2Fsvg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-layout">
  <!-- Left Panel: Branding -->
  <div class="login-branding">
    <a href="index.html" class="login-logo">LUXEBRAND</a>
    <p class="login-tagline">Private Brokerage for Luxury Goods</p>
  </div>

  <!-- Right Panel: Sign In Form -->
  <div class="login-form-panel">
    <div class="login-card glass-light">
      <h1>Sign In</h1>
      <form data-fake-submit data-confirm-message="Welcome back!">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        <div class="form-confirmation"></div>
      </form>
      <a href="#" class="login-forgot">Forgot Password?</a>
      <hr class="login-divider">
      <p class="login-signup">Don't have an account? <a href="#">Create one</a></p>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
