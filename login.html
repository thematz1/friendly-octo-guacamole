<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — LuxeBrand</title>
  <meta name="description" content="Access your private LuxeBrand portfolio. Members-only entry to authenticated luxury pieces and white-glove brokerage services.">
  <meta property="og:title" content="Sign In — LuxeBrand">
  <meta property="og:description" content="Members-only access to your private portfolio">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/splitting/dist/splitting.css">
  <link rel="stylesheet" href="https://unpkg.com/splitting/dist/splitting-cells.css">
</head>
<body>

<div class="login-layout">
  <!-- Left Panel: Branding -->
  <div class="login-branding">
    <a href="index.html" class="login-logo">LUXEBRAND</a>
    <p class="login-tagline">Private Brokerage for Luxury Goods</p>
  </div>

  <!-- Right Panel: Sign In Form -->
  <div class="login-form-panel">
    <div class="login-card glass-light">
      <h1>Welcome Back</h1>
      <form data-fake-submit data-confirm-message="Accessing your private portfolio...">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Enter</button>
        <div class="form-confirmation"></div>
      </form>
      <a href="forgot-password.html" class="login-forgot">Forgot Password?</a>
      <hr class="login-divider">
      <p class="login-signup">Not yet a member? <a href="register.html">Request access</a></p>
    </div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
<script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js" defer></script>
<script src="https://unpkg.com/splitting/dist/splitting.min.js" defer></script>
<script src="https://unpkg.com/@barba/core@2.9.7/dist/barba.umd.js" defer></script>
<script src="https://unpkg.com/three@0.169.0/build/three.min.js" defer></script>

<!-- App -->
<script src="js/main.js" defer></script>
<script src="js/cursor.js" defer></script>
<script src="js/animations.js" defer></script>
<script src="js/particles.js" defer></script>
<script src="js/transitions.js" defer></script>
</body>
</html>
